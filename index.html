<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Outrun: an interactive laboratory for Conway's Angel Problem on an infinite grid." />
    <meta name="theme-color" content="#0b0e14" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b0e14'/%3E%3Crect x='8' y='8' width='14' height='14' rx='3' fill='%238e2f23'/%3E%3Crect x='42' y='42' width='14' height='14' rx='3' fill='%238e2f23'/%3E%3Ccircle cx='32' cy='32' r='11' fill='%237dd3fc'/%3E%3C/svg%3E"
    />
    <title>Outrun: Conway's Angel Problem</title>
    <script type="module" crossorigin src="./assets/index-C7HDCa92.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DB1EQQwH.css">
  </head>
  <body>
    <canvas id="board"></canvas>

    <div id="hud">
      <span id="status" class="chip">…</span>
      <span id="metrics" class="chip">…</span>
    </div>

    <button id="panel-open" title="show panel" hidden>☰</button>

    <aside id="panel">
      <header>
        <div>
          <h1>Outrun</h1>
          <p class="sub">Conway's Angel Problem</p>
        </div>
        <button id="panel-toggle" title="hide panel">✕</button>
      </header>

      <section>
        <h2>Match</h2>
        <label class="field">
          <span>Angel</span>
          <select id="angel-strategy"></select>
        </label>
        <label class="field">
          <span>Devil</span>
          <select id="devil-strategy"></select>
        </label>
        <label class="field">
          <span>Power</span>
          <select id="power">
            <option>1</option>
            <option selected>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </label>
        <button id="new-game" class="primary">New game</button>
      </section>

      <section>
        <h2>Playback</h2>
        <div class="row buttons">
          <button id="play" title="space">▶ Play</button>
          <button id="step" title="s or →">Step</button>
          <button id="undo" title="u">Undo</button>
          <button id="recenter" title="c">Recenter</button>
        </div>
        <label class="field">
          <span>Speed</span>
          <span class="slider-wrap">
            <input type="range" id="speed" min="0" max="100" value="51" />
            <span id="speed-label">4/s</span>
          </span>
        </label>
      </section>

      <section>
        <h2>Overlays</h2>
        <div class="opts">
          <label><input type="checkbox" class="opt" data-opt="legal" checked /> Legal destinations</label>
          <label><input type="checkbox" class="opt" data-opt="frontier" /> Reachable frontier</label>
          <label><input type="checkbox" class="opt" data-opt="trail" checked /> Move history trail</label>
          <label><input type="checkbox" class="opt" data-opt="territory" /> Devil territory</label>
          <label><input type="checkbox" class="opt" data-opt="heatmap" /> Distance heat map</label>
          <label><input type="checkbox" class="opt" data-opt="grid" checked /> Coordinate grid</label>
        </div>
      </section>

      <footer>
        drag pan · wheel zoom · <b>space</b> play · <b>s</b> step · <b>u</b> undo · <b>c</b> recenter
      </footer>
    </aside>

    <div id="banner" hidden>
      <div class="card">
        <div id="banner-text"></div>
        <button id="banner-new" class="primary">New game</button>
      </div>
    </div>

    <div id="toast" hidden></div>

    <footer id="credit">
      made with ❤️ by <a href="https://dhawal-pandya.github.io/" target="_blank" rel="noopener">Dhawal Pandya</a>
    </footer>

  </body>
</html>
